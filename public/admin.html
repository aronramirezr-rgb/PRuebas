<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | CustomForge MX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="navbar">
    <a class="brand" href="/"><span class="brand-mark">CF</span><span>Admin CustomForge</span></a>
    <nav class="nav-links"><a href="/">Sitio público</a></nav>
    <button class="ghost" id="logoutBtn">Salir</button>
  </header>

  <main class="section">
    <div class="container">
      <section class="panel controls" id="loginPanel">
        <p class="eyebrow">Acceso privado</p>
        <h2>Panel admin</h2>
        <p>Contraseña inicial: <strong>admin123</strong>. Cámbiala al entrar.</p>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" autocomplete="current-password">
        </div>
        <button class="btn" id="loginBtn">Entrar</button>
        <p id="loginStatus"></p>
      </section>

      <section id="adminPanel" style="display:none">
        <p class="eyebrow">Gestión sin código</p>
        <h2>Catálogo, termos y precios</h2>
        <div class="grid-2">
          <form class="panel controls" id="categoryForm">
            <h3>Categoría</h3>
            <input type="hidden" name="id">
            <div class="field"><label>Nombre</label><input name="name" required></div>
            <div class="field"><label>Slug</label><input name="slug" placeholder="llaveros"></div>
            <div class="field"><label>Orden</label><input name="sort_order" type="number" value="0"></div>
            <label><input name="active" type="checkbox" checked> Activa</label>
            <div class="button-row">
              <button class="btn">Guardar categoría</button>
              <button class="ghost" type="button" data-clear="categoryForm">Nuevo</button>
            </div>
          </form>

          <form class="panel controls" id="passwordForm">
            <h3>Contraseña</h3>
            <div class="field"><label>Nueva contraseña</label><input name="password" type="password" minlength="6"></div>
            <button class="btn">Cambiar contraseña</button>
          </form>
        </div>

        <form class="panel controls" id="productForm" style="margin-top:1rem">
          <h3>Producto STL / GLB</h3>
          <input type="hidden" name="id">
          <div class="grid-3">
            <div class="field"><label>Nombre</label><input name="name" required></div>
            <div class="field"><label>Categoría</label><select name="category_id" id="productCategory"></select></div>
            <div class="field"><label>Precio base MXN</label><input name="base_price_mxn" type="number" step="0.01" value="0"></div>
          </div>
          <div class="field"><label>Descripción</label><textarea name="description"></textarea></div>
          <div class="grid-2">
            <div class="field"><label>Archivo STL o GLB</label><input name="model_file" type="file" accept=".stl,.glb"></div>
            <div class="field"><label>Miniatura</label><input name="thumbnail_file" type="file" accept=".png,.jpg,.jpeg,.webp,.svg"></div>
          </div>
          <label><input name="active" type="checkbox" checked> Activo</label>
          <div class="button-row">
            <button class="btn">Guardar producto</button>
            <button class="ghost" type="button" data-clear="productForm">Nuevo</button>
          </div>
        </form>

        <form class="panel controls" id="tumblerForm" style="margin-top:1rem">
          <h3>Modelo de termo GLB</h3>
          <input type="hidden" name="id">
          <div class="grid-3">
            <div class="field"><label>Nombre</label><input name="name" required></div>
            <div class="field"><label>Onzas</label><input name="ounces" type="number" value="30"></div>
            <div class="field"><label>Precio base MXN</label><input name="base_price_mxn" type="number" step="0.01" value="0"></div>
          </div>
          <div class="grid-3">
            <div class="field"><label>Precio por imagen/grabado MXN</label><input name="engraving_price_mxn" type="number" step="0.01" value="45"></div>
            <div class="field"><label>Modelo GLB</label><input name="model_file" type="file" accept=".glb"></div>
            <label><input name="has_handle" type="checkbox"> Tiene asa</label>
          </div>
          <label><input name="active" type="checkbox" checked> Activo</label>
          <div class="button-row">
            <button class="btn">Guardar termo</button>
            <button class="ghost" type="button" data-clear="tumblerForm">Nuevo</button>
          </div>
        </form>

        <div class="grid-3" style="margin-top:1rem">
          <section class="panel controls"><h3>Categorías</h3><div id="categoryList"></div></section>
          <section class="panel controls"><h3>Productos</h3><div id="productList"></div></section>
          <section class="panel controls"><h3>Termos</h3><div id="tumblerList"></div></section>
        </div>
        <p id="adminStatus"></p>
      </section>
    </div>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
